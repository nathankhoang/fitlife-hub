  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#accent)"/>
  <g transform="translate(200 200)">
    <rect x="-90" y="-12" width="180" height="24" rx="6" fill="#475569"/>
    <rect x="-130" y="-50" width="40" height="100" rx="8" fill="#0F172A"/>
    <rect x="-150" y="-35" width="20" height="70" rx="6" fill="#0F172A"/>
