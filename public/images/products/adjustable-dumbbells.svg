<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Adjustable dumbbells">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <radialGradient id="accent" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#475569" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#475569" stop-opacity="0"/>
