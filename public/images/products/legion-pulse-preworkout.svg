<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Legion Pulse pre-workout">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <radialGradient id="accent" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#accent)"/>
  <g transform="translate(200 210)">
    <rect x="-90" y="-100" width="180" height="200" rx="14" fill="#FAFAFA" stroke="#0F172A" stroke-width="3"/>
    <rect x="-95" y="-110" width="190" height="30" rx="8" fill="#0F172A"/>
    <text x="0" y="-50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#0F172A" letter-spacing="3">LEGION</text>
    <text x="0" y="-15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="900" fill="#F97316" letter-spacing="2">PULSE</text>
    <line x1="-50" y1="5" x2="50" y2="5" stroke="#0F172A" stroke-width="2"/>
    <text x="0" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#525252" letter-spacing="3">PRE-WORKOUT</text>
    <text x="0" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#525252">350MG CAFFEINE</text>
  </g>
</svg>
