    <rect x="36" y="-36" width="14" height="40" rx="2" fill="#0F172A"/>
    <rect x="-100" y="20" width="200" height="10" rx="2" fill="#475569" opacity="0.4"/>
  </g>
  <text x="200" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0F172A" letter-spacing="3">PULL-UP BAR</text>
