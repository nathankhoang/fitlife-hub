    <rect x="-130" y="60" width="260" height="14" rx="4" fill="#475569"/>
    <rect x="-150" y="-100" width="14" height="180" rx="4" fill="#0F172A"/>
    <rect x="136" y="-100" width="14" height="180" rx="4" fill="#0F172A"/>
    <rect x="-90" y="-50" width="180" height="14" rx="4" fill="#0F172A"/>
