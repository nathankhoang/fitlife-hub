<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Foam roller">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <radialGradient id="accent" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <rect width="22" height="22" fill="#0F172A"/>
      <rect x="3" y="3" width="16" height="16" rx="3" fill="#1E293B"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#accent)"/>
  <g transform="translate(200 210)">
    <ellipse cx="-130" cy="0" rx="20" ry="60" fill="#475569"/>
    <rect x="-130" y="-60" width="260" height="120" fill="url(#grid)"/>
    <ellipse cx="130" cy="0" rx="20" ry="60" fill="#475569"/>
    <ellipse cx="130" cy="0" rx="14" ry="48" fill="#1E293B"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0F172A" letter-spacing="3">FOAM ROLLER</text>
</svg>
