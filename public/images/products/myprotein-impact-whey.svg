<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="ISO whey protein tub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <radialGradient id="accent" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#accent)"/>
  <g transform="translate(200 210)">
    <rect x="-90" y="-100" width="180" height="200" rx="14" fill="#FAFAFA" stroke="#0F172A" stroke-width="3"/>
    <rect x="-95" y="-110" width="190" height="30" rx="8" fill="#0F172A"/>
    <text x="0" y="-50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#0EA5E9" letter-spacing="2">ISO</text>
    <text x="0" y="-22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#0F172A">100</text>
    <line x1="-60" y1="-5" x2="60" y2="-5" stroke="#E5E5E5" stroke-width="2"/>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F172A" letter-spacing="2">WHEY ISOLATE</text>
    <text x="0" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#525252">25G PROTEIN</text>
  </g>
</svg>
