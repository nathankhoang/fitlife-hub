<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Diet &amp; Nutrition">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <g transform="translate(400 265)">
    <!-- Apple body: two lobes at top meet at centre dip, round bottom -->
    <path d="M 0 -52 C -22 -90 -80 -84 -82 -38 C -84 8 -70 60 -38 80 C -18 92 0 84 0 84 C 0 84 18 92 38 80 C 70 60 84 8 82 -38 C 80 -84 22 -90 0 -52 Z" fill="#FAFAFA" opacity="0.95"/>
    <!-- Stem -->
    <path d="M 7 -55 C 14 -82 30 -98 28 -94" stroke="#34D399" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Leaf -->
    <path d="M 24 -95 C 48 -115 72 -103 60 -80 C 54 -68 28 -76 24 -95 Z" fill="#34D399"/>
  </g>
  <text x="40" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#FAFAFA" letter-spacing="3" opacity="0.85">DIET &amp; NUTRITION</text>
</svg>
