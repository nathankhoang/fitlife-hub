<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Weight Loss">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C2D12"/>
      <stop offset="100%" stop-color="#9A3412"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <!-- Running figure: thick rounded strokes create solid capsule limbs -->
  <g transform="translate(400, 248)" stroke="#FAFAFA" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <!-- Head -->
    <circle cx="42" cy="-95" r="26" fill="#FAFAFA" stroke="none"/>
    <!-- Torso (leaning forward) -->
    <line x1="36" y1="-68" x2="-12" y2="28" stroke-width="32"/>
    <!-- Forward arm (swings ahead) -->
    <line x1="22" y1="-45" x2="85" y2="-68" stroke-width="24"/>
    <!-- Back arm (swings behind) -->
    <line x1="10" y1="-52" x2="-58" y2="-18" stroke-width="24"/>
    <!-- Forward leg (long stride) -->
    <line x1="-12" y1="28" x2="58" y2="88" stroke-width="28"/>
    <!-- Back leg (extends behind) -->
    <line x1="-12" y1="28" x2="-72" y2="65" stroke-width="28"/>
    <!-- Front foot -->
    <line x1="58" y1="88" x2="88" y2="96" stroke-width="22"/>
  </g>
  <text x="40" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#FAFAFA" letter-spacing="3" opacity="0.85">WEIGHT LOSS</text>
</svg>
