<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Weight Loss">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C2D12"/>
      <stop offset="100%" stop-color="#9A3412"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <!-- Flame: narrow teardrop with cusp tip and orange inner core -->
  <g transform="translate(400, 262)">
    <!-- Outer flame: ~130px wide, ~220px tall, cusp at top -->
    <path d="M 0,88 C -45,76 -65,28 -62,-28 C -58,-68 -40,-104 -20,-120 C -10,-126 0,-130 0,-132 C 0,-130 10,-126 20,-120 C 40,-104 58,-68 62,-28 C 65,28 45,76 0,88 Z" fill="#FAFAFA" opacity="0.95"/>
    <!-- Inner hot core: orange teardrop -->
    <path d="M 0,52 C -28,28 -38,-18 -22,-58 C -12,-82 0,-94 0,-94 C 0,-94 12,-82 22,-58 C 38,-18 28,28 0,52 Z" fill="#FB923C" opacity="0.85"/>
  </g>
  <text x="40" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#FAFAFA" letter-spacing="3" opacity="0.85">WEIGHT LOSS</text>
</svg>
