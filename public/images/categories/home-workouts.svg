<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Home Workouts">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <g transform="translate(400 250)" stroke="#FAFAFA" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95">
    <line x1="-130" y1="0" x2="130" y2="0"/>
    <rect x="-150" y="-40" width="20" height="80" rx="4" fill="#FAFAFA"/>
    <rect x="130" y="-40" width="20" height="80" rx="4" fill="#FAFAFA"/>
    <rect x="-180" y="-25" width="20" height="50" rx="4" fill="#FAFAFA"/>
    <rect x="160" y="-25" width="20" height="50" rx="4" fill="#FAFAFA"/>
  </g>
  <text x="40" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#FAFAFA" letter-spacing="3" opacity="0.85">HOME WORKOUTS</text>
</svg>
