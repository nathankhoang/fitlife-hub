<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Muscle Building">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7F1D1D"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F87171" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F87171" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <g transform="translate(375 275)" fill="#FAFAFA" opacity="0.95">
    <!-- Forearm: vertical rounded rectangle going up -->
    <rect x="-30" y="-125" width="56" height="165" rx="28"/>
    <!-- Upper arm: horizontal rounded rectangle going right -->
    <rect x="-8" y="-20" width="150" height="56" rx="28"/>
    <!-- Bicep peak: ellipse bulging up at the elbow junction -->
    <ellipse cx="8" cy="-42" rx="52" ry="42"/>
  </g>
  <text x="40" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#FAFAFA" letter-spacing="3" opacity="0.85">MUSCLE BUILDING</text>
</svg>
